# Tiny Tapeout project information
project:
  title:        "TTIHP26a_Luke_Meta"      # Project title
  author:       "Luca Pezzarossa"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A demostrator of metastability effects."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_luke_meta"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "sc/inverter.v"
    - "sc/and2.v"
    - "sc/and4.v"
    - "sc/or2.v"
    - "sc/or3.v"
    - "sc/or4.v"
    - "inverter_chain.v"
    - "data_generator.v"
    - "calibrate_data_generator.v"
    - "tunable_delay.v"
    - "hold_buffer.v"
    - "metastability_detector_1.v"
    - "metastability_detector_2.v"
    - "metastability_counter.v"
    - "reset_synchronizer.v"
    - "input_synchronizer.v"
    - "start_delay.v"
    - "meta_top.v"
    - "tt_um_luke_meta.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_frequency_ctrl[0] (in)"
  ui[1]: "data_frequency_ctrl[1] (in)"
  ui[2]: "data_frequency_ctrl[2] (in)"
  ui[3]: "prescaler_bypass_ctrl[0] (in)"
  ui[4]: "prescaler_bypass_ctrl[1] (in)"
  ui[5]: "external_data (in)"
  ui[6]: "detector_select (in)"
  ui[7]: "calibration_mode (in)"

  # Outputs
  uo[0]: "metastability_count[0] (out)"
  uo[1]: "metastability_count[1] (out)"
  uo[2]: "metastability_count[2] (out)"
  uo[3]: "metastability_count[3] (out)"
  uo[4]: "metastability_count[4] (out)"
  uo[5]: "metastability_count[5] (out)"
  uo[6]: "metastability_count[6] (out)"
  uo[7]: "metastability_count[7] (out)"

  # Bidirectional pins
  uio[0]: "metastability_detected (out)"
  uio[1]: "data_monitor (out)"
  uio[2]: "tune_delay_monitor (out)"
  uio[3]: "tune_delay_ctrl[0] (in)"
  uio[4]: "tune_delay_ctrl[1] (in)"
  uio[5]: "tune_delay_ctrl[2] (in)"
  uio[6]: "tune_delay_ctrl[3] (in)"
  uio[7]: "tune_delay_ctrl[4] (in)"

# Do not change!
yaml_version: 6
